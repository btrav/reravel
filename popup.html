<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="brand">RERAVEL</header>

    <div id="toggle-area" class="toggle-area">
      <button
        id="toggle"
        class="toggle-switch"
        role="switch"
        aria-checked="false"
        aria-label="Toggle grayscale filter"
      >
        <span class="toggle-thumb"></span>
      </button>
      <p id="status-label" class="status-label">Grayscale off</p>
    </div>

    <div id="snooze-area" class="snooze-area">
      <div id="snooze-buttons" class="snooze-buttons">
        <button id="snooze-1" class="snooze-btn" aria-label="Snooze for 1 minute">Snooze 1 min</button>
        <button id="snooze-5" class="snooze-btn" aria-label="Snooze for 5 minutes">Snooze 5 min</button>
        <button id="snooze-custom" class="snooze-btn" hidden></button>
      </div>
      <p id="snooze-status" class="snooze-status" aria-live="polite"></p>
    </div>

    <div id="bizarro-area" class="bizarro-area">
      <label class="bizarro-label">
        <input
          id="bizarro"
          type="checkbox"
          class="bizarro-checkbox"
          aria-label="Toggle bizarro mode"
        >
        <span class="bizarro-check"></span>
        Bizarro mode
      </label>
    </div>

    <div id="empty-state" class="empty-state" hidden>
      <h2 id="empty-headline" class="empty-headline"></h2>
      <p id="empty-subhead" class="empty-subhead"></p>
      <button id="watch-site-btn" class="empty-cta" hidden></button>
    </div>

    <div id="off-state" class="empty-state" hidden>
      <h2 id="off-headline" class="empty-headline"></h2>
      <div class="off-quote">
        <p id="off-quote-text" class="off-quote-text"></p>
        <p id="off-quote-author" class="off-quote-author"></p>
      </div>
      <p id="off-elapsed" class="off-elapsed"></p>
      <button id="turn-on-btn" class="empty-cta">Turn on</button>
    </div>

    <footer class="popup-footer">
      <span id="site-label" class="site-label"></span>
      <a id="options-link" class="options-link" href="#">Settings</a>
    </footer>
  </div>
  <script src="quotes.js"></script>
  <script src="popup.js"></script>
</body>
</html>
